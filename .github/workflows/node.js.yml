# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    # - name: Build
    #   run: npm run build --if-present

    # - name: Install PM2 globally (if not installed)
    #   run: npm list -g pm2 || npm install -g pm2

    - name: Start or Restart app with PM2
      # run: pm2 startOrRestart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
      run: pm2 startOrRestart hlynk-server --update-env

    - name: Save PM2 process list
      run: pm2 save