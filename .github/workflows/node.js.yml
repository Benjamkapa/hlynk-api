name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # Runs safely on GitHub's servers to verify Pull Requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install dependencies
      working-directory: server
      run: npm install

  deploy:
    # Runs exclusively on your actual server ONLY upon code being merged or pushed
    if: github.event_name == 'push'
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: Install dependencies
      working-directory: server
      run: npm install

    - name: Remove pushed .env file
      working-directory: server
      run: rm -f .env

    - name: Stop existing PM2 process if it exists
      run: pm2 delete hlynk-server || true

    - name: Start PM2 process
      working-directory: server
      run: |
        source /etc/profile
        pm2 start index.js --name hlynk-server --interpreter node --update-env

    - name: Save PM2 process list
      run: pm2 save
